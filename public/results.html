<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens — Analysis Results</title>
    <meta name="description" content="Full forensic news verification report powered by TruthLens AI.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0a28;
            --bg-card: rgba(15, 10, 40, 0.65);
            --border: rgba(123, 97, 255, 0.15);
            --text: #f8f9fa;
            --text-muted: #94a3b8;
            --text-dim: #cbd5e1;
            --accent: #00f0ff;
            --accent-purple: #7B61FF;
            --green: #00e676;
            --green-bg: rgba(0, 230, 118, 0.1);
            --green-border: rgba(0, 230, 118, 0.3);
            --yellow: #ffb703;
            --yellow-bg: rgba(255, 183, 3, 0.1);
            --yellow-border: rgba(255, 183, 3, 0.3);
            --red: #ff3366;
            --red-bg: rgba(255, 51, 102, 0.1);
            --red-border: rgba(255, 51, 102, 0.3);
            --blue: #00f0ff;
            --blue-bg: rgba(0, 240, 255, 0.1);
            --blue-border: rgba(0, 240, 255, 0.3);
            --purple: #c77dff;
            --purple-bg: rgba(199, 125, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(135deg, #0f0a28 0%, #110c2a 25%, #120a2f 50%, #1d0749 75%, #3f1b7e 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAV — original floating pill style */
        nav {
            position: fixed;
            top: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1280px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            background: rgba(10, 0, 32, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(123, 97, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 15px rgba(123,97,255,0.15);
        }
        .nav-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 400;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
        }
        .nav-brand strong {
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff 0%, #7B61FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-btn {
            background: rgba(123,97,255,0.15) !important;
            color: #fff !important;
            border: 1px solid rgba(123,97,255,0.4) !important;
            padding: 0.5rem 1.25rem !important;
            border-radius: 25px !important;
            font-weight: 600 !important;
            font-size: 0.88rem !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
        }
        .nav-btn:hover {
            background: rgba(123,97,255,0.3) !important;
            border-color: rgba(123,97,255,0.8) !important;
        }

        /* LAYOUT */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 7rem 1.5rem 4rem;
        }

        /* PAGE HEADER */
        .page-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .page-top h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(270deg, #00f0ff, #ff3366, #c77dff, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 6s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .page-top p { color: var(--text-muted); font-size: 0.88rem; margin-top: 0.25rem; }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            border: 1px solid rgba(123,97,255,0.35);
            border-radius: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.3s;
            background: rgba(123,97,255,0.08);
            white-space: nowrap;
        }
        .btn-back:hover { background: rgba(123,97,255,0.18); color: var(--text); }

        /* CARDS — original animated gradient border */
        .card {
            position: relative;
            background: rgba(15,10,40,0.65);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 24px;
            background: linear-gradient(135deg, #c77dff, #7000ff, #a29bfe, #7000ff, #c77dff);
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* VERDICT HERO */
        .verdict-hero {
            position: relative;
            background: rgba(15,10,40,0.65);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            overflow: hidden;
        }
        .verdict-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 24px;
            background: linear-gradient(135deg, #c77dff, #7000ff, #a29bfe, #7000ff, #c77dff);
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
            opacity: 0.8;
            animation: gradientShift 8s ease infinite;
        }
        .verdict-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .verdict-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid currentColor;
            margin-bottom: 0.75rem;
        }
        .verdict-badge.verified { color: var(--green); background: var(--green-bg); }
        .verdict-badge.likely-verified { color: #34d399; background: rgba(52,211,153,0.1); }
        .verdict-badge.unverified { color: var(--yellow); background: var(--yellow-bg); }
        .verdict-badge.likely-false { color: #fb923c; background: rgba(251,146,60,0.1); }
        .verdict-badge.false { color: var(--red); background: var(--red-bg); }
        .verdict-badge.satire { color: var(--purple); background: var(--purple-bg); }
        .verdict-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .verdict-explanation {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.7;
            max-width: 500px;
        }

        .score-widget { text-align: center; flex-shrink: 0; }
        .score-number {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            font-family: 'JetBrains Mono', monospace;
            color: var(--verdict-color, #00f0ff);
        }
        .score-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.3rem; }
        .score-bar-outer {
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            margin-top: 1.5rem;
            overflow: hidden;
        }
        .score-bar-inner {
            height: 100%;
            border-radius: 4px;
            background: var(--verdict-color, #00f0ff);
            transition: width 1s cubic-bezier(0.4,0,0.2,1);
            width: 0;
        }

        /* META ROW */
        .meta-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(123,97,255,0.15);
        }
        .meta-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.2rem; }
        .meta-value { font-size: 0.88rem; font-weight: 600; color: var(--text); }

        /* GRIDS */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        /* SIGNAL BARS */
        .signal-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .signal-row-top { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
        .signal-name { font-size: 0.8rem; color: var(--text-dim); }
        .signal-val { font-size: 0.8rem; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }
        .signal-bar-outer { height: 4px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
        .signal-bar-inner { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }

        /* AI PROB */
        .ai-big-number { font-size: 3rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.04em; line-height: 1; margin-bottom: 0.5rem; }
        .ai-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }
        .ai-bar-outer { height: 6px; background: rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; margin-bottom: 0.75rem; }
        .ai-bar-inner { height: 100%; border-radius: 6px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
        .ai-bar-inner.low { background: var(--green); }
        .ai-bar-inner.medium { background: var(--yellow); }
        .ai-bar-inner.high { background: var(--red); }
        .ai-verdict-text { font-size: 0.82rem; color: var(--text-dim); }
        .ai-verdict-text strong { color: var(--text); }

        /* CHART */
        .chart-wrap { position: relative; height: 200px; }

        /* SENTENCES */
        .sent-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 240px; overflow-y: auto; }
        .sent-list::-webkit-scrollbar { width: 4px; }
        .sent-list::-webkit-scrollbar-thumb { background: rgba(199,125,255,0.3); border-radius: 4px; }
        .sent-row { display: flex; gap: 0.6rem; align-items: flex-start; padding: 0.55rem 0.75rem; border-radius: 10px; font-size: 0.82rem; line-height: 1.5; }
        .sent-row.low { background: rgba(0,230,118,0.05); border-left: 2px solid var(--green); }
        .sent-row.medium { background: rgba(255,183,3,0.05); border-left: 2px solid var(--yellow); }
        .sent-row.high { background: rgba(255,51,102,0.05); border-left: 2px solid var(--red); }
        .sent-badge { flex-shrink:0; font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; padding:0.1rem 0.4rem; border-radius:4px; margin-top:1px; }
        .sent-badge.low { color:var(--green); background:var(--green-bg); }
        .sent-badge.medium { color:var(--yellow); background:var(--yellow-bg); }
        .sent-badge.high { color:var(--red); background:var(--red-bg); }
        .sent-text { color: var(--text-dim); }

        /* TABLES */
        .claims-table { width: 100%; border-collapse: collapse; }
        .claims-table th { text-align:left; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); padding:0 0.75rem 0.75rem; border-bottom:1px solid rgba(123,97,255,0.15); }
        .claims-table td { padding:0.75rem; border-bottom:1px solid rgba(123,97,255,0.08); vertical-align:top; font-size:0.82rem; }
        .claims-table tr:last-child td { border-bottom:none; }
        .claims-table td:first-child { color:var(--text-dim); }
        .claims-table td:last-child { color:var(--text-muted); font-size:0.79rem; }

        /* BADGES */
        .badge { display:inline-flex; align-items:center; padding:0.2rem 0.55rem; border-radius:5px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap; }
        .badge.true, .badge.valid { color:var(--green); background:var(--green-bg); border:1px solid var(--green-border); }
        .badge.false { color:var(--red); background:var(--red-bg); border:1px solid var(--red-border); }
        .badge.unverified { color:var(--yellow); background:var(--yellow-bg); border:1px solid var(--yellow-border); }

        /* CONSISTENCY */
        .consistency-alert { padding:0.65rem 0.85rem; border-radius:10px; font-size:0.82rem; margin-bottom:0.5rem; }
        .consistency-alert.success { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
        .consistency-alert.warning { background:var(--red-bg); border:1px solid var(--red-border); color:var(--red); }
        .consistency-alert strong { display:block; margin-bottom:0.2rem; }
        .consistency-alert p { color:var(--text-dim); }

        /* DUAL SCORE */
        .dual-score { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.75rem; }
        .dual-score-box { background:rgba(255,255,255,0.03); border:1px solid rgba(123,97,255,0.15); border-radius:12px; padding:0.85rem; text-align:center; }
        .dual-score-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.35rem; }
        .dual-score-val { font-size:1.6rem; font-weight:800; font-family:'JetBrains Mono',monospace; }
        .dual-score-val.good { color:var(--green); }
        .dual-score-val.bad { color:var(--red); }

        /* KG */
        .kg-row { display:flex; align-items:flex-start; gap:0.75rem; padding:0.7rem 0; border-bottom:1px solid rgba(123,97,255,0.1); font-size:0.82rem; }
        .kg-row:last-child { border-bottom:none; }
        .kg-relation { flex:1; color:var(--text-dim); line-height:1.5; }
        .kg-relation .subject { color:#00f0ff; font-weight:600; }
        .kg-relation .predicate { color:var(--text-muted); font-style:italic; margin:0 0.25rem; }
        .kg-relation .object { color:#c77dff; font-weight:600; }
        .kg-reason { width:180px; color:var(--text-muted); font-size:0.76rem; flex-shrink:0; }

        /* WORD CLOUD */
        .word-cloud { display:flex; flex-wrap:wrap; gap:0.5rem; }
        .word-tag { padding:0.3rem 0.65rem; background:rgba(255,51,102,0.08); border:1px solid rgba(255,51,102,0.3); color:#ff7096; border-radius:8px; font-size:0.8rem; font-weight:500; }
        .empty-state { color:var(--text-muted); font-style:italic; font-size:0.82rem; }

        /* PIPELINE BANNER */
        .pipeline-banner { display:flex; align-items:center; gap:0.65rem; padding:0.65rem 1rem; border-radius:12px; margin-bottom:1.25rem; font-size:0.82rem; background:rgba(0,230,118,0.06); border:1px solid rgba(0,230,118,0.25); color:var(--green); }
        .pipeline-banner span { color:var(--text-dim); }
        .pipeline-banner strong { color:var(--green); }

        /* RISK COLORS */
        .risk-high { color:var(--red); }
        .risk-med { color:var(--yellow); }
        .risk-low { color:var(--green); }

        /* FOOTER BUTTONS — original purple gradient style */
        .action-footer { display:flex; gap:0.75rem; margin-top:1.5rem; flex-wrap:wrap; }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            position: relative;
            background: linear-gradient(135deg, #c77dff 0%, #120a2f 100%);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(199,125,255,0.25);
        }
        .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(199,125,255,0.35); }
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid rgba(123,97,255,0.35);
            color: var(--text-muted);
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
            background: rgba(123,97,255,0.05);
        }
        .btn-ghost:hover { background: rgba(123,97,255,0.15); color: var(--text); }

        /* NO DATA */
        .no-data { min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .no-data h2 { font-size:1.2rem; margin-bottom:0.5rem; }
        .no-data p { color:var(--text-muted); margin-bottom:1.5rem; font-size:0.88rem; }

        @media (max-width: 640px) {
            .grid-2 { grid-template-columns: 1fr; }
            .meta-row { grid-template-columns: 1fr 1fr; }
            .verdict-top { flex-direction: column; }
            .kg-reason { display: none; }
            nav { width: 95%; padding: 0.6rem 1.25rem; }
        }
    </style>
</head>
