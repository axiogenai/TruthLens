<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens — Analysis Results</title>
    <meta name="description" content="Full forensic news verification report powered by TruthLens AI.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0b0f;
            --bg-card: #111318;
            --bg-card-hover: #161920;
            --border: rgba(255,255,255,0.07);
            --border-accent: rgba(255,255,255,0.12);
            --text: #e8eaed;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.3);
            --green: #10b981;
            --green-bg: rgba(16,185,129,0.1);
            --green-border: rgba(16,185,129,0.3);
            --yellow: #f59e0b;
            --yellow-bg: rgba(245,158,11,0.1);
            --yellow-border: rgba(245,158,11,0.3);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.1);
            --red-border: rgba(239,68,68,0.3);
            --blue: #3b82f6;
            --blue-bg: rgba(59,130,246,0.1);
            --blue-border: rgba(59,130,246,0.3);
            --purple: #8b5cf6;
            --purple-bg: rgba(139,92,246,0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,11,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }
        .nav-brand span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }
        .nav-btn {
            background: var(--accent);
            color: white !important;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        /* LAYOUT */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* PAGE HEADER */
        .page-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .page-top h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }
        .page-top p { color: var(--text-muted); font-size: 0.82rem; margin-top: 0.2rem; }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-back:hover { background: var(--bg-card); color: var(--text); }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-title svg { opacity: 0.6; }

        /* VERDICT HERO */
        .verdict-hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        .verdict-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--verdict-color, var(--accent));
        }
        .verdict-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .verdict-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid currentColor;
            margin-bottom: 0.75rem;
        }
        .verdict-badge.verified { color: var(--green); background: var(--green-bg); }
        .verdict-badge.likely-verified { color: #34d399; background: rgba(52,211,153,0.1); }
        .verdict-badge.unverified { color: var(--yellow); background: var(--yellow-bg); }
        .verdict-badge.likely-false { color: #fb923c; background: rgba(251,146,60,0.1); }
        .verdict-badge.false { color: var(--red); background: var(--red-bg); }
        .verdict-badge.satire { color: var(--purple); background: var(--purple-bg); }
        .verdict-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .verdict-explanation {
            font-size: 0.92rem;
            color: var(--text-dim);
            line-height: 1.7;
            max-width: 520px;
        }

        .score-widget {
            text-align: center;
            flex-shrink: 0;
        }
        .score-number {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            font-family: 'JetBrains Mono', monospace;
            color: var(--verdict-color, var(--accent));
        }
        .score-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.3rem; }
        .score-bar-outer {
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            margin-top: 1.5rem;
            overflow: hidden;
        }
        .score-bar-inner {
            height: 100%;
            border-radius: 4px;
            background: var(--verdict-color, var(--accent));
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0;
        }

        /* META ROW */
        .meta-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
        }
        .meta-item { }
        .meta-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
        .meta-value { font-size: 0.88rem; font-weight: 600; color: var(--text); }

        /* 2-COL GRID */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        /* SIGNAL BARS */
        .signal-list { display: flex; flex-direction: column; gap: 0.7rem; }
        .signal-row { }
        .signal-row-top { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
        .signal-name { font-size: 0.8rem; color: var(--text-dim); }
        .signal-val { font-size: 0.8rem; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }
        .signal-bar-outer { height: 4px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
        .signal-bar-inner { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0; }

        /* AI PROB */
        .ai-big-number {
            font-size: 3rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .ai-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }
        .ai-bar-outer { height: 6px; background: rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; margin-bottom: 0.75rem; }
        .ai-bar-inner { height: 100%; border-radius: 6px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0; }
        .ai-bar-inner.low { background: var(--green); }
        .ai-bar-inner.medium { background: var(--yellow); }
        .ai-bar-inner.high { background: var(--red); }
        .ai-verdict-text { font-size: 0.82rem; color: var(--text-dim); }
        .ai-verdict-text strong { color: var(--text); }

        /* CHART */
        .chart-wrap { position: relative; height: 220px; }

        /* SENTENCE BREAKDOWN */
        .sent-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 280px; overflow-y: auto; }
        .sent-list::-webkit-scrollbar { width: 4px; }
        .sent-list::-webkit-scrollbar-track { background: transparent; }
        .sent-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .sent-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .sent-row.low { background: rgba(16,185,129,0.05); border-left: 2px solid var(--green); }
        .sent-row.medium { background: rgba(245,158,11,0.05); border-left: 2px solid var(--yellow); }
        .sent-row.high { background: rgba(239,68,68,0.05); border-left: 2px solid var(--red); }
        .sent-badge {
            flex-shrink: 0;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-top: 1px;
        }
        .sent-badge.low { color: var(--green); background: var(--green-bg); }
        .sent-badge.medium { color: var(--yellow); background: var(--yellow-bg); }
        .sent-badge.high { color: var(--red); background: var(--red-bg); }
        .sent-text { color: var(--text-dim); }

        /* CLAIMS TABLE */
        .claims-table { width: 100%; border-collapse: collapse; }
        .claims-table th {
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            padding: 0 0.75rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .claims-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            font-size: 0.82rem;
        }
        .claims-table tr:last-child td { border-bottom: none; }
        .claims-table td:first-child { color: var(--text-dim); }
        .claims-table td:last-child { color: var(--text-muted); font-size: 0.79rem; }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.55rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .badge.true, .badge.valid { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }
        .badge.false { color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }
        .badge.unverified { color: var(--yellow); background: var(--yellow-bg); border: 1px solid var(--yellow-border); }

        /* CONSISTENCY */
        .consistency-alert {
            padding: 0.65rem 0.85rem;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 0.5rem;
        }
        .consistency-alert.success { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
        .consistency-alert.warning { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
        .consistency-alert strong { display: block; margin-bottom: 0.2rem; }
        .consistency-alert p { color: var(--text-dim); }

        /* SCORE BOXES */
        .dual-score { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.75rem; }
        .dual-score-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem; text-align: center; }
        .dual-score-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
        .dual-score-val { font-size: 1.6rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .dual-score-val.good { color: var(--green); }
        .dual-score-val.bad { color: var(--red); }

        /* KG TABLE */
        .kg-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
        }
        .kg-row:last-child { border-bottom: none; }
        .kg-relation { flex: 1; color: var(--text-dim); line-height: 1.5; }
        .kg-relation .subject { color: var(--blue); font-weight: 600; }
        .kg-relation .predicate { color: var(--text-muted); font-style: italic; margin: 0 0.25rem; }
        .kg-relation .object { color: var(--purple); font-weight: 600; }
        .kg-reason { width: 180px; color: var(--text-muted); font-size: 0.76rem; flex-shrink: 0; }

        /* WORD CLOUD */
        .word-cloud { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .word-tag {
            padding: 0.3rem 0.65rem;
            background: rgba(239,68,68,0.08);
            border: 1px solid var(--red-border);
            color: #fca5a5;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .empty-state { color: var(--text-muted); font-style: italic; font-size: 0.82rem; }

        /* PIPELINE BANNER */
        .pipeline-banner {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            background: rgba(16,185,129,0.06);
            border: 1px solid var(--green-border);
            color: var(--green);
        }
        .pipeline-banner svg { flex-shrink: 0; }
        .pipeline-banner span { color: var(--text-dim); }
        .pipeline-banner strong { color: var(--green); }

        /* FOOTER ACTIONS */
        .action-footer {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent);
            color: white;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid var(--border-accent);
            color: var(--text-dim);
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-ghost:hover { background: var(--bg-card); color: var(--text); }

        /* RISK COLORS */
        .risk-high { color: var(--red); }
        .risk-med { color: var(--yellow); }
        .risk-low { color: var(--green); }

        /* NO DATA STATE */
        .no-data {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .no-data h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .no-data p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.88rem; }

        @media (max-width: 640px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .meta-row { grid-template-columns: 1fr 1fr; }
            .verdict-top { flex-direction: column; }
            .kg-reason { display: none; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">Truth<span>Lens</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="analyze.html" class="nav-btn">+ New Analysis</a>
        </div>
    </nav>

    <div class="container">
        <div id="results-root"></div>
    </div>

    <div id="toast-container" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:0.5rem;"></div>

    <script src="results.js?v=70"></script>
</body>
</html>
